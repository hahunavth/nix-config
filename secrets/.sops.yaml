# sops creation rules. Maps encrypted files to the age recipients (PUBLIC keys)
# allowed to decrypt them. Replace the placeholder below with your real age
# public key (`age-keygen -y ~/.config/sops/age/keys.txt`), then:
#   sops secrets/secrets.yaml     # create/edit the encrypted store
#
# Only PUBLIC keys go here; the private key lives at ~/.config/sops/age/keys.txt
# and is never committed. See docs/runbooks/secrets.md.
keys:
  - &primary age1REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
creation_rules:
  - path_regex: secrets/[^/]+\.ya?ml$
    key_groups:
      - age:
          - *primary
